---
# This Docker compose file includes:
#   Homarr
#   Netdata
#   Grafana TODO: Migrate from Netdata to Grafana, eventually

services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    environment:
      - TZ=Europe/Madrid
      - SECRET_ENCRYPTION_KEY=9fb0446198ef137e6dcb75568f0c9f7266fdd52b9d7a07875767e55beb29d77c
    volumes:
      - ./homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock # For controlling Docker within Homarr
    # ports:
    #   - '7575:7575'
    networks:
      homelab:
        ipv4_address: 10.0.1.14

  netdata:
    container_name: netdata
    image: netdata/netdata
    pid: host
    # network_mode: host # If returning to this setting, no need to add ports setting
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./netdata/config:/etc/netdata
      - ./netdata/lib:/var/lib/netdata
      - ./netdata/cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      homelab:
        ipv4_address: 10.0.1.15

#  grafana:
#    container_name: grafana
#    image: grafana/grafana-enterprise
#    restart: unless-stopped
#    # if you are running as root then set it to 0
#    # else find the right id with the id -u command
#    user: '0'
#    volumes:
#      - ./grafana:/var/lib/grafana
#    ports:
#      - '3000:3000'
#    networks:
#      homelab:
#        ipv4_address: 10.0.1.15

networks:
  homelab:
    external: true
